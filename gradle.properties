# NOTE: no org.gradle.jvmargs here on purpose — this bench PC's firewall blocks
# java.exe loopback sockets, so Gradle must run in-process (--no-daemon) and any
# jvmargs mismatch would force a forked daemon that cannot connect back.
android.useAndroidX=true
android.nonTransitiveRClass=true
org.gradle.vfs.watch=false
